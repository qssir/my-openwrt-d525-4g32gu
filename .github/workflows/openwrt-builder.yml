name: OpenWrt Builder

on:
  repository_dispatch:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 20 * * 4'
  # watch:
  #   types: [started]

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Free disk space and setup swap
      run: |
        sudo swapoff /swapfile 2>/dev/null || true
        sudo rm -f /swapfile 2>/dev/null || true
        sudo mkdir -p /mnt/swap
        sudo fallocate -l 16G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
        sudo chmod 600 /mnt/swapfile
        sudo mkswap /mnt/swapfile
        sudo swapon /mnt/swapfile
        echo "=== Memory Status ==="
        free -h
        sudo swapon --show
        echo "=== Disk Status ==="
        df -hT
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force 2>/dev/null || true

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpcre2-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        
        # 彻底移除旧版 CMake
        sudo apt-get remove --purge -y cmake cmake-data || true
        sudo rm -f /usr/bin/cmake /usr/bin/ctest /usr/bin/cpack /usr/local/bin/cmake /usr/local/bin/ctest /usr/local/bin/cpack
        
        # 安装 CMake 3.31.5
        wget -qO /tmp/cmake.tar.gz https://github.com/Kitware/CMake/releases/download/v3.31.5/cmake-3.31.5-linux-x86_64.tar.gz
        sudo tar -xzf /tmp/cmake.tar.gz -C /opt
        
        # 创建全局符号链接
        sudo ln -sf /opt/cmake-3.31.5-linux-x86_64/bin/cmake /usr/bin/cmake
        sudo ln -sf /opt/cmake-3.31.5-linux-x86_64/bin/ctest /usr/bin/ctest
        sudo ln -sf /opt/cmake-3.31.5-linux-x86_64/bin/cpack /usr/bin/cpack
        sudo ln -sf /opt/cmake-3.31.5-linux-x86_64/bin/cmake /usr/local/bin/cmake
        sudo ln -sf /opt/cmake-3.31.5-linux-x86_64/bin/ctest /usr/local/bin/ctest
        sudo ln -sf /opt/cmake-3.31.5-linux-x86_64/bin/cpack /usr/local/bin/cpack
        
        # 刷新缓存并验证
        hash -r
        echo "=== CMake Version Check ==="
        which cmake
        cmake --version
        echo "=== CTest Version Check ==="
        ctest --version
        
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download package
      id: package
      run: |
        cd openwrt
        echo "=== .config first 30 lines ==="
        cat .config | head -30
        echo "=== Running make defconfig ==="
        make defconfig
        echo "=== Downloading packages ==="
        make download -j8 || make download -j1 || { echo "Download failed, retrying..."; sleep 30; make download -j1; }
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Fix CMake for OpenWrt compile
      run: |
        cd /workdir/openwrt
        # 恢复 tools/cmake/Makefile（如果之前被修改）
        git checkout tools/cmake/Makefile 2>/dev/null || true
        
        # 复制新版 CMake 到 OpenWrt 的 host 工具链
        mkdir -p staging_dir/host/bin
        cp -f /opt/cmake-3.31.5-linux-x86_64/bin/cmake staging_dir/host/bin/cmake || true
        cp -f /opt/cmake-3.31.5-linux-x86_64/bin/ctest staging_dir/host/bin/ctest || true
        cp -f /opt/cmake-3.31.5-linux-x86_64/bin/cpack staging_dir/host/bin/cpack || true
        chmod +x staging_dir/host/bin/*
        
        # 创建标记文件，欺骗 OpenWrt 认为 CMake 已编译完成
        mkdir -p build_dir/host/cmake-3.31.5
        touch build_dir/host/cmake-3.31.5/.prepared
        touch build_dir/host/cmake-3.31.5/.configured
        touch build_dir/host/cmake-3.31.5/.built
        touch build_dir/host/cmake-3.31.5/.installed
        
        # 修改 OpenWrt 的 cmake.mk 强制使用系统 CMake
        if [ -f "include/cmake.mk" ]; then
          sed -i 's|CMAKE_COMMAND := .*|CMAKE_COMMAND := /usr/bin/cmake|g' include/cmake.mk || true
          echo "=== cmake.mk CMAKE_COMMAND ==="
          grep "CMAKE_COMMAND" include/cmake.mk | head -3
        fi
        
        # 全局降级所有 CMakeLists.txt 的 3.31 要求
        echo "=== Fixing CMakeLists.txt files ==="
        find . -name "CMakeLists.txt" -exec grep -l "cmake_minimum_required(VERSION 3.31" {} \; | while read f; do
          echo "Fixing: $f"
          sed -i 's/cmake_minimum_required(VERSION 3\.31)/cmake_minimum_required(VERSION 3.30)/g' "$f"
        done
        
        echo "=== Verification ==="
        echo "System cmake:"
        /usr/bin/cmake --version
        echo "Staging cmake:"
        ./staging_dir/host/bin/cmake --version 2>/dev/null || echo "not found"
        echo "Modified CMakeLists.txt count:"
        find . -name "CMakeLists.txt" -exec grep -l "cmake_minimum_required(VERSION 3.30" {} \; | wc -l

    - name: Compile the firmware
      id: compile
      env:
        PATH: /opt/cmake-3.31.5-linux-x86_64/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      run: |
        cd openwrt
        echo "=== PATH ==="
        echo $PATH
        echo "=== Which CMake ==="
        which cmake
        cmake --version
        echo "=== Memory before compile ==="
        free -h
        echo "=== CPU info ==="
        nproc
        echo "=== Starting compile with $(nproc) threads ==="
        make -j$(nproc) || { echo "=== Parallel compile failed, retrying with single thread ==="; make -j1; } || { echo "=== Single thread failed, verbose mode ==="; make -j1 V=s; }
        if [ ! -d "bin/targets" ]; then
          echo "ERROR: Compile failed, bin/targets directory not found"
          exit 1
        fi
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: /workdir/openwrt/bin/targets

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd /workdir/openwrt/bin/targets/*/* || { echo "ERROR: Firmware directory not found"; exit 1; }
        rm -rf packages
        rm -rf *swapfile* || true
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "N4100 ImmortalWrt 24.10 固件" > release.txt
        echo "编译时间: $(date)" >> release.txt
        echo "源码: $REPO_URL ($REPO_BRANCH)" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: |
          ${{ env.FIRMWARE }}/*.img.gz
          ${{ env.FIRMWARE }}/*.manifest
          ${{ env.FIRMWARE }}/*.json

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@v0.3.4
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
